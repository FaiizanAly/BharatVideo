<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Reset your BharatVideo password. Enter your email and we'll send you a one-time code.">
  <title>Forgot Password – BharatVideo</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
</head>

<body class="auth-page">

  <!-- Navbar (minimal) -->
  <header class="auth-navbar">
    <a href="index.html" class="logo" aria-label="BharatVideo – Go to homepage">
      <span class="logo-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="white"><path d="M8 5v14l11-7z"/></svg>
      </span>
      <span class="logo-text">Bharat<span>Video</span></span>
    </a>
  </header>

  <!-- Auth Body -->
  <main class="auth-body">
    <div class="auth-card">

      <a href="index.html" class="auth-logo" aria-label="BharatVideo">
        Bharat<span>Video</span>
      </a>

      <!-- Lock icon -->
      <div style="display:flex; justify-content:center; margin-bottom:16px;">
        <div style="width:56px; height:56px; background:var(--brand-light); border-radius:50%; display:flex; align-items:center; justify-content:center;">
          <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="var(--brand)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0110 0v4"/>
          </svg>
        </div>
      </div>

      <h1 class="auth-title">Forgot password?</h1>
      <p  class="auth-sub">Enter your registered email and we'll send you a verification code.</p>

      <!-- FORGOT PASSWORD FORM -->
      <form id="forgotForm" novalidate>

        <!-- Email -->
        <div class="form-group">
          <label for="email">Email address</label>
          <div class="input-wrap">
            <input
              type="email"
              id="email"
              class="form-input"
              placeholder="you@example.com"
              autocomplete="email"
              required
            >
          </div>
          <p class="field-error" role="alert"></p>
        </div>

        <!-- Submit -->
        <button type="submit" class="btn-submit" id="forgot-submit">
          <span class="btn-label">Send Verification Code</span>
          <span class="btn-spinner" aria-hidden="true"><span class="spinner"></span></span>
        </button>

      </form>

      <p class="auth-footer-text">
        Remembered your password?
        <a href="login.html" class="link-accent">Back to sign in</a>
      </p>

    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
